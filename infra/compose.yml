services:
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: simple-vite-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple-vite-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql
  frontend:
    build:
      args:
        VITE_BASE_URL: https://lumenlabs.site/api/v1
      context: ../simple-vite-react-express
      dockerfile: ../infra/frontend/Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - server
  server:
    build:
      context: ../simple-vite-react-express
      dockerfile: ../infra/server/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:mysecretpassword@database:5432/simple-vite-db?schema=public
volumes:
  postgres_data:
